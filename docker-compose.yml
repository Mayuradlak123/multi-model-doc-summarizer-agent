version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: agent_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Cache & Job Queue Service
  redis:
    image: redis:7-alpine
    container_name: agent_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. ChromaDB Vector Store Service
  chroma:
    image: chromadb/chroma:latest
    container_name: agent_chroma
    restart: always
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_NO_TELEMETRY=True
    volumes:
      - chroma_data:/chroma/chroma

  # 4. FastAPI Web Server Application
  web:
    build: .
    container_name: agent_web
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8080:8000"  # Expose on 8080 to avoid conflicts if local dev server is running on 8000
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      # Unset URL to force connection to the local containerized Postgres DB
      - POSTGRES_URL=
    volumes:
      - .:/app
      - storage_data:/app/storage
    depends_on:
      - db
      - redis
      - chroma

  # 5. Background Task Queue Worker (RQ Worker)
  worker:
    build: .
    container_name: agent_worker
    restart: always
    command: python worker.py
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_URL=
    volumes:
      - .:/app
      - storage_data:/app/storage
    depends_on:
      - redis
      - db
      - chroma

# Permanent Storage Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  storage_data:
    driver: local
